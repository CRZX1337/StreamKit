workflows:
  ios-build:
    name: StreamKit iOS Build
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project StreamKit.xcodeproj \
            -scheme StreamKit
            
      - name: Archive iOS app (Unsigned for Sideloading)
        script: |
          xcodebuild archive \
            -project StreamKit.xcodeproj \
            -scheme StreamKit \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath "$PWD/build/StreamKit.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENTITLEMENTS_REQUIRED=NO
            
      - name: Package into Unsigned IPA
        script: |
          # Create Payload directory
          mkdir -p "$PWD/build/Payload"
          
          # Copy the perfectly assembled .app from the xcarchive
          cp -a "$PWD/build/StreamKit.xcarchive/Products/Applications/StreamKit.app" "$PWD/build/Payload/"
          
          # Zip into an IPA
          cd "$PWD/build"
          zip -qr StreamKit-unsigned.ipa Payload
          
    artifacts:
      - build/StreamKit-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log